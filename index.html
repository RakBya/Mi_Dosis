<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Mis Remedios - Chile</title>
    <style>
        :root { 
            --bg-body: #f0f4f8; --bg-card: white; --text-main: #1e293b; --border: #cbd5e1; 
            --btn-primary: #4f46e5; --btn-danger: #ef4444; --btn-success: #10b981;
        }
        .dark-mode { 
            --bg-body: #121212; --bg-card: #1e1e1e; --text-main: #f8fafc; --border: #334155; 
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-body); 
            color: var(--text-main); padding: 15px; margin: 0; font-size: 18px; transition: 0.3s; 
        }
        
        .card { 
            background: var(--bg-card); padding: 20px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); max-width: 500px; margin: auto; border: 2px solid var(--border); 
        }
        
        .reloj-digital { 
            font-size: 2.8rem; font-weight: 900; margin: 10px 0 20px 0; background: var(--border); 
            padding: 20px; border-radius: 15px; text-align: center; 
        }
        
        .config-box { 
            background: #fff7ed; border: 2px solid #fed7aa; padding: 15px; border-radius: 12px; 
            margin-bottom: 20px; font-size: 15px; color: #9a3412; text-align: center;
        }
        .dark-mode .config-box { background: #2d1a0a; border-color: #452a10; color: #fbbf24; }

        input, select, button { 
            width: 100%; padding: 16px; margin: 8px 0 15px 0; border-radius: 12px; 
            border: 2px solid var(--border); font-size: 18px; box-sizing: border-box; 
            background: var(--bg-card); color: var(--text-main); font-weight: bold;
        }
        
        button { background: var(--btn-primary); color: white; border: none; cursor: pointer; }
        
        .btn-audio-alerta { animation: parpadeo 1.5s infinite; }
        @keyframes parpadeo {
            0% { background-color: #ef4444; }
            50% { background-color: #dc2626; }
            100% { background-color: #ef4444; }
        }

        .tema-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .tema-btn { flex: 1; padding: 12px; font-size: 14px; cursor: pointer; border-radius: 10px; border: 2px solid var(--border); text-align: center; font-weight: bold; }

        .dias-selector { display: flex; justify-content: space-between; margin: 15px 0 25px 0; }
        .dia-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .dia-btn.active { background: var(--btn-primary); color: white; border-color: var(--btn-primary); }

        .alarma-item { background: var(--bg-card); padding: 18px; border-radius: 15px; border: 2px solid var(--border); margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--btn-success); }
        input:checked + .slider:before { transform: translateX(26px); }

        .alarma-activa { position: fixed; top:0; left:0; width:100%; height:100%; z-index:9999; display:none; flex-direction:column; justify-content:center; align-items:center; background: rgba(0,0,0,0.9); }
        #contenedor-mensaje { background: white; padding: 30px; border-radius: 30px; width: 90%; max-width: 450px; text-align: center; color: #1e293b; }
    </style>
</head>
<body>

<div class="card">
    <div class="tema-selector">
        <div class="tema-btn" style="background: white; color: black;" onclick="setTema('light')">☀️ DÍA</div>
        <div class="tema-btn" style="background: #121212; color: white;" onclick="setTema('dark')">🌙 NOCHE</div>
    </div>

    <div class="reloj-digital" id="reloj-vivo">00:00:00</div>
    
    <div class="config-box">
        <button id="btn-audio" class="btn-audio-alerta" onclick="activarAudio()">🔊 ACTIVAR SONIDO</button>
    </div>

    <h3>Nuevo Remedio</h3>
    <input type="time" id="hora">
    <input type="text" id="nombre" placeholder="Nombre (ej: Paracetamol)">
    <input type="number" id="cantidad" placeholder="Cantidad en caja (opcional)">

    <div class="dias-selector">
        <div class="dia-btn" onclick="toggleDia(this, 1)">Lu</div>
        <div class="dia-btn" onclick="toggleDia(this, 2)">Ma</div>
        <div class="dia-btn" onclick="toggleDia(this, 3)">Mi</div>
        <div class="dia-btn" onclick="toggleDia(this, 4)">Ju</div>
        <div class="dia-btn" onclick="toggleDia(this, 5)">Vi</div>
        <div class="dia-btn" onclick="toggleDia(this, 6)">Sa</div>
        <div class="dia-btn" onclick="toggleDia(this, 0)">Do</div>
    </div>

    <div style="display: flex; gap: 10px;">
        <select id="icono" style="flex: 1;">
            <option value="💊">💊 Pastilla</option>
            <option value="💧">💧 Gotas</option>
            <option value="💉">💉 Inyección</option>
            <option value="🩹">🩹 Parche/Crema</option>
        </select>
        
        <select id="color" style="flex: 1;">
            <option value="#f87171">Rojo</option>
            <option value="#60a5fa">Azul</option>
            <option value="#34d399">Verde</option>
            <option value="#fbbf24">Amarillo</option>
            <option value="#a78bfa">Morado</option>
            <option value="#fb923c">Naranja</option>
        </select>
    </div>

    <button onclick="guardarAlarma()" style="font-size: 20px; padding: 20px;">💾 GUARDAR ALARMA</button>

    <div class="lista-alarmas" id="lista-alarmas"></div>
</div>

<div id="pantalla-alarma" class="alarma-activa">
    <div id="contenedor-mensaje">
        <div id="icono-grande" style="font-size: 100px;"></div>
        <h1 id="texto-remedio"></h1>
        <button onclick="detenerAlarma()" style="background: var(--btn-success); padding: 25px; font-size: 22px; border-radius: 20px;">✔️ YA LO TOMÉ</button>
    </div>
</div>

<script>
    let alarmas = JSON.parse(localStorage.getItem('remedios')) || [];
    let audioCtx = null, loopSonido = null, diasSeleccionados = [], idAlarmaSonando = null;

    function setTema(m) {
        document.body.classList.toggle('dark-mode', m === 'dark');
        localStorage.setItem('tema-preferido', m);
    }
    if(localStorage.getItem('tema-preferido') === 'dark') setTema('dark');

    function activarAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const btn = document.getElementById('btn-audio');
        btn.classList.remove('btn-audio-alerta');
        btn.style.background = "var(--btn-success)";
        btn.innerHTML = "✅ SONIDO LISTO";
    }

    function toggleDia(el, dia) {
        el.classList.toggle('active');
        if(diasSeleccionados.includes(dia)) diasSeleccionados = diasSeleccionados.filter(d => d !== dia);
        else diasSeleccionados.push(dia);
    }

    function guardarAlarma() {
        const h = document.getElementById('hora').value, n = document.getElementById('nombre').value;
        if(!h || !n) return alert("Por favor escribe la hora y el nombre");
        alarmas.push({
            id: Date.now(), hora: h, nombre: n, 
            cantidad: document.getElementById('cantidad').value || null,
            icono: document.getElementById('icono').value, 
            color: document.getElementById('color').value,
            dias: [...diasSeleccionados], encendida: true
        });
        salvarYRenderizar();
        document.getElementById('nombre').value = "";
        diasSeleccionados = [];
        document.querySelectorAll('.dia-btn').forEach(b => b.classList.remove('active'));
    }

    function salvarYRenderizar() {
        localStorage.setItem('remedios', JSON.stringify(alarmas));
        renderAlarmas();
    }

    function renderAlarmas() {
        const div = document.getElementById('lista-alarmas');
        div.innerHTML = "";
        alarmas.forEach(a => {
            div.innerHTML += `
                <div class="alarma-item" style="border-left: 10px solid ${a.color}">
                    <div><strong>${a.hora}</strong><br>${a.icono} ${a.nombre}</div>
                    <label class="switch">
                        <input type="checkbox" ${a.encendida ? 'checked' : ''} onchange="toggleEncendido(${a.id})">
                        <span class="slider"></span>
                    </label>
                </div>`;
        });
    }

    function toggleEncendido(id) {
        const idx = alarmas.findIndex(a => a.id === id);
        alarmas[idx].encendida = !alarmas[idx].encendida;
        salvarYRenderizar();
    }

    setInterval(() => {
        const ahora = new Date();
        const hChile = ahora.toLocaleTimeString('es-CL', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'America/Santiago' });
        document.getElementById('reloj-vivo').innerText = hChile;
        const hhmm = hChile.substring(0, 5);
        alarmas.forEach(a => {
            if(a.encendida && a.hora === hhmm && ahora.getSeconds() === 0) {
                if(a.dias.length === 0 || a.dias.includes(ahora.getDay())) {
                    lanzarAlarma(a);
                }
            }
        });
    }, 1000);

    function lanzarAlarma(a) {
        const p = document.getElementById('pantalla-alarma');
        p.style.display = 'flex';
        document.getElementById('icono-grande').innerText = a.icono;
        document.getElementById('texto-remedio').innerText = a.nombre;
        if(audioCtx) {
            loopSonido = setInterval(() => {
                const o = audioCtx.createOscillator();
                o.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + 0.2);
            }, 800);
        }
    }

    function detenerAlarma() {
        document.getElementById('pantalla-alarma').style.display = 'none';
        clearInterval(loopSonido);
    }

    renderAlarmas();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('pwabuilder-sw.js');
    }
</script>
</body>
</html>
